<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Lucky Apples</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">

    <!-- Header -->

    <header class="header">

        <h1>🍎Harven Apple Reveal</h1>

        <p>Révélez les pommes une par une.</p>

    </header>

    <!-- Plateau -->

    <section class="board">

        <!-- Multiplicateurs -->

        <div class="multipliers" id="multipliers">

            <!-- Généré par JS -->

        </div>

        <!-- Grille -->

        <div class="grid" id="grid">

            <!-- Les 50 cases seront créées automatiquement -->

        </div>

    </section>

    <!-- Infos -->

    <div class="progress">

        <span id="revealed">
            0
        </span>

        /

        <span id="total">
            0
        </span>

        pommes révélées

    </div>

    <!-- Boutons -->

    <div class="buttons">

        <button id="revealBtn">

            Dévoiler

        </button>

        <button id="resetBtn">

            Nouveau tour

        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
